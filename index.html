      var u = 'jakub';

    })();

    (function() {
      var baseFont = 16;
      var h = document.documentElement;
      var b = document.body;
      function ratio() { return window.innerHeight / (b.offsetHeight * 1.05); }
      function update() {
        if (window.innerWidth <= 768) { h.style.fontSize = ''; baseFont = 16; return; }
        var r = ratio();
        if (r >= 1 && r <= 1.05) return;
        baseFont = baseFont * r;
        h.style.fontSize = baseFont + 'px';
        for (var i = 0; i < 8; i++) {
          var r2 = ratio();
          if (r2 >= 1 && r2 <= 1.05) break;
          baseFont = baseFont * r2;
          h.style.fontSize = baseFont + 'px';
        }
      }
      window.addEventListener('resize', function() { baseFont = 16; h.style.fontSize = ''; update(); });
      update();
    })();
  </script>
